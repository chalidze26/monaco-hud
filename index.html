<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco HUD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: transparent;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }
        .hud-box {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .hud-line {
            background: rgba(0, 0, 0, 0.55);
            padding: 4px 10px;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            min-width: 120px;
            text-align: right;
        }
        .hud-label {
            color: #ccc;
            font-size: 10px;
            text-transform: uppercase;
            margin-right: 6px;
        }
        #hp-value { color: #ff5555; }
        #arm-value { color: #55aaff; }
        #money-value { color: #55ff77; }
    </style>
</head>
<body>

    <div class="hud-box">
        <div class="hud-line">
            <span class="hud-label">HP</span>
            <span id="hp-value">0</span>
        </div>
        <div class="hud-line">
            <span class="hud-label">ARM</span>
            <span id="arm-value">0</span>
        </div>
        <div class="hud-line">
            <span class="hud-label">$</span>
            <span id="money-value">0</span>
        </div>
    </div>

    <script>
        (function() {
            var domReady = false;
            var cefReady = false;

            function log(msg) {
                if (typeof cef !== 'undefined' && cef.log) {
                    cef.log('[MonacoHUD] ' + msg);
                } else {
                    console.log('[MonacoHUD] ' + msg);
                }
            }

            function setupListener() {
                if (!domReady || !cefReady) return;

                log('cef found. Registering updateServerHUD listener...');

                cef.on('updateServerHUD', function(rawData) {
                    log('Raw data received: ' + rawData);

                    try {
                        // Parse the single JSON payload from PAWN
                        var data = JSON.parse(rawData);

                        var hpEl = document.getElementById('hp-value');
                        var armEl = document.getElementById('arm-value');
                        var moneyEl = document.getElementById('money-value');

                        if (hpEl) hpEl.innerText = data.hp || '0';
                        if (armEl) armEl.innerText = data.armor || '0';
                        if (moneyEl) moneyEl.innerText = data.money || '0';

                        log('Parsed | HP:' + data.hp + ' ARM:' + data.armor + ' $:' + data.money);
                    } catch (e) {
                        log('JSON PARSE ERROR: ' + e.message);
                    }
                });
            }

            // DOM ready check
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                domReady = true;
            } else {
                document.addEventListener('DOMContentLoaded', function() {
                    domReady = true;
                    setupListener();
                });
            }

            // Poll for cef API
            function waitForCef() {
                if (typeof cef !== 'undefined') {
                    cefReady = true;
                    setupListener();
                } else {
                    setTimeout(waitForCef, 150);
                }
            }
            waitForCef();
        })();
    </script>
</body>
</html>
