<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco HUD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: transparent;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }
        .hud-box {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .hud-line {
            background: rgba(0, 0, 0, 0.55);
            padding: 4px 10px;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            min-width: 120px;
            text-align: right;
        }
        .hud-label {
            color: #ccc;
            font-size: 10px;
            text-transform: uppercase;
            margin-right: 6px;
        }
        #hp-value { color: #ff5555; }
        #arm-value { color: #55aaff; }
        #money-value { color: #55ff77; }
    </style>
</head>
<body>

    <div class="hud-box">
        <div class="hud-line">
            <span class="hud-label">HP</span>
            <span id="hp-value">0</span>
        </div>
        <div class="hud-line">
            <span class="hud-label">ARM</span>
            <span id="arm-value">0</span>
        </div>
        <div class="hud-line">
            <span class="hud-label">$</span>
            <span id="money-value">0</span>
        </div>
    </div>

    <script>
        (function() {
            var domReady = false;
            var cefReady = false;

            function log(msg) {
                if (typeof cef !== 'undefined' && cef.log) {
                    cef.log('[MonacoHUD] ' + msg);
                } else {
                    console.log('[MonacoHUD] ' + msg);
                }
            }

            function setupListener() {
                if (!domReady || !cefReady) return;

                log('cef found. Registering updateServerHUD listener...');

                cef.on('updateServerHUD', function(hp, armor, money) {
                    log('Data received | HP:' + hp + ' ARM:' + armor + ' $:' + money);

                    var hpEl = document.getElementById('hp-value');
                    var armEl = document.getElementById('arm-value');
                    var moneyEl = document.getElementById('money-value');

                    if (hpEl) hpEl.innerText = hp;
                    if (armEl) armEl.innerText = armor;
                    if (moneyEl) moneyEl.innerText = money;
                });
            }

            // 1. Wait for DOM
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                domReady = true;
            } else {
                document.addEventListener('DOMContentLoaded', function() {
                    domReady = true;
                    setupListener();
                });
            }

            // 2. Poll for cef object (it is injected AFTER page load by the plugin)
            function waitForCef() {
                if (typeof cef !== 'undefined') {
                    cefReady = true;
                    setupListener();
                } else {
                    console.log('[MonacoHUD] cef not ready yet, polling...');
                    setTimeout(waitForCef, 150);
                }
            }
            waitForCef();
        })();
    </script>
</body>
</html>
