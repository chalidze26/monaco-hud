<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco HUD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: transparent;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }
        .hud-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-left: 3px solid #00d4ff;
            padding: 8px 14px;
            border-radius: 0 6px 6px 0;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            min-width: 140px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .hud-label { color: #aaa; font-size: 11px; text-transform: uppercase; }
        .hud-value { color: #fff; font-size: 14px; }
        #money-value { color: #00ff88; }
        #hp-value { color: #ff4444; }
        #arm-value { color: #4488ff; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-item">
            <span class="hud-label">Health</span>
            <span class="hud-value" id="hp-value">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Armor</span>
            <span class="hud-value" id="arm-value">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Cash</span>
            <span class="hud-value" id="money-value">$0</span>
        </div>
    </div>

    <script>
        // Debug helper — logs to the CEF console (visible if you enable CEF dev tools)
        function cefLog(msg) {
            if (typeof cef !== 'undefined' && cef.log) {
                cef.log('[MonacoHUD] ' + msg);
            } else {
                console.log('[MonacoHUD] ' + msg);
            }
        }

        // Wait for DOM to be fully parsed
        document.addEventListener('DOMContentLoaded', function() {
            cefLog('DOM loaded. Setting up CEF event listeners...');

            // Make sure the CEF API is available
            if (typeof cef === 'undefined') {
                cefLog('ERROR: cef object is undefined! Are you running this inside SA-MP CEF?');
                return;
            }

            // ============================================================
            // THIS IS THE CRITICAL FIX — listen via cef.on(), NOT addEventListener
            // ============================================================
            cef.on('updateServerHUD', function(hp, armor, money) {
                // Update DOM elements safely
                var hpEl = document.getElementById('hp-value');
                var armEl = document.getElementById('arm-value');
                var moneyEl = document.getElementById('money-value');

                if (hpEl) hpEl.innerText = hp;
                if (armEl) armEl.innerText = armor;
                if (moneyEl) moneyEl.innerText = '$' + money;
            });

            // Optional: tell PAWN we are ready to receive data
            // (Uncomment the next line if your PAWN uses a ready-handshake system)
            // cef.emit('hudReady');

            cefLog('Event listener registered successfully.');
        });
    </script>
</body>
</html>
